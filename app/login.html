

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belltower – Sign In</title>

  <style>
    :root {
      --blue-dark: #0b2d4f;
      --blue-main: #1f5fa8;
      --blue-light: #eaf3ff;
      --gray: #475569;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

   
body.auth-layout {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

 
  background:
    linear-gradient(
      to bottom,
      rgba(15, 45, 75, 0.15) 0%,
      rgba(15, 45, 75, 0.15) 40%,
      rgba(235, 241, 246, 1) 75%,
      rgba(235, 241, 246, 1) 100%
    ),
    url("images/hero-belltower-wide.png");

  background-size:230%;              /* ✅ zoom OUT slightly */
  background-position: 27% top;       /* ✅ shift image right */
  background-repeat: no-repeat;

  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}







    /* ---------- AUTH CARD ---------- */
    .auth-card {
      background: #0b2d4f;
      width: 100%;
      max-width: 420px;
      padding: 2.25rem;
      border-radius: 14px;

      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.25);

      text-align: center;
    }

    .auth-card h1 {
      color: var(--blue-main);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .auth-card p {
      color: var(--white);
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
    }

.auth-card {
  backdrop-filter: blur(2px);
}


.auth-logo {
  max-height: 56px;          /* controls layout height */
  width: auto;
  margin-bottom: 1rem;

  transform: scale(2.25);     /* visual size only */
  transform-origin: center;
}


    /* ---------- GOOGLE BUTTON ---------- */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;

      width: 100%;
      padding: 0.7rem 1rem;

      background: var(--white);
      border: 1px solid #d1d5db;
      border-radius: 8px;

      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;

      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background: #f8fafc;
      box-shadow:
        0 6px 18px rgba(0, 0, 0, 0.32);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>

<body class="auth-layout">

  <div class="surface auth-card">
    
<img

/>

  </div>

async function handlePostLoginRedirect() {
  console.log('POST LOGIN REDIRECT CHECK');

  const { data } = await supabase.auth.getSession();
  if (!data?.session) return; // Not logged in yet

  const user = data.session.user;


const { data: profile, error } = await supabase
  .from('profiles')
  .select(`
    status,
    can_login,
    is_superadmin,
    can_access_admin,
    can_manage_access,
    can_approve_pto,
    can_adjust_pto,
    can_bulk_upload
  `)
  .eq('user_id', user.id)
  .single();


  if (error || !profile) {
    alert('Profile not found.');
    return;
  }
  
  
  // ✅ HARD SECURITY GATE — FIRST
  if (profile.can_login !== true) {
    await supabase.auth.signOut();
    alert('Your account is disabled. Please contact an administrator.');
    window.location.href = '/login.html';
    return;
  }
console.log('SESSION:', data.session);

  // ✅ Pending users never get portal access
  if (profile.status === 'pending') {
    window.location.href = '/pending.html';
    return;
  }

  // ✅ Capability-based admin access check
  const hasAdminAccess =
    profile.is_superadmin === true ||
    profile.can_access_admin === true ||
    profile.can_manage_access === true ||
    profile.can_approve_pto === true ||
    profile.can_adjust_pto === true ||
    profile.can_bulk_upload === true;

  if (hasAdminAccess) {
    window.location.href = '/admin.html';
  } else {
    window.location.href = '/staff.html';
  }
}


// Run on page load
handlePostLoginRedirect();
  </script>
</body>
</html>
