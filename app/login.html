
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belltower – Sign In</title>

  <style>
    /* ======================================================
       THEME VARIABLES
    ====================================================== */
    :root {
      --navy-900: #071c2f;
      --navy-800: #0b2d4f;
      --blue-main: #1f5fa8;
      --text-muted: #cbd5e1;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ======================================================
       PAGE BACKGROUND
    ====================================================== */
    body.auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

      background:
        linear-gradient(
          to bottom,
          rgba(7, 28, 47, 0.35),
          rgba(7, 28, 47, 0.55)
        ),
        url("images/hero-belltower-wide.png");

      background-size: 230%;
      background-position: 27% top;
      background-repeat: no-repeat;
    }

    /* ======================================================
       FROSTED GLASS AUTH CARD
    ====================================================== */
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2.25rem;

      border-radius: 16px;

      /* ✅ CSS‑only frosted glass */
      background: rgba(11, 45, 79, 0.7);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);

      border: 1px solid rgba(255, 255, 255, 0.15);

      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.35);

      text-align: center;
    }

    /* Fallback for browsers without backdrop-filter */
    @supports not (backdrop-filter: blur(10px)) {
      .auth-card {
        background: #0b2d4f;
      }
    }

    /* ======================================================
       BRANDING
    ====================================================== */
    .auth-logo {
      max-height: 54px;
      width: auto;
      margin-bottom: 1.25rem;
      transform: scale(1.9);
    }

    .auth-card h1 {
      color: var(--white);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .auth-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* ======================================================
       GOOGLE SIGN‑IN BUTTON
    ====================================================== */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;

      width: 100%;
      padding: 0.75rem 1rem;

      background: var(--white);
      border: 1px solid #d1d5db;
      border-radius: 10px;

      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;

      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background: #f8fafc;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
    }

    /* ======================================================
       TRUST / META TEXT
    ====================================================== */
    .auth-meta {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    /* ======================================================
       MOBILE TWEAKS
    ====================================================== */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.75rem;
        border-radius: 14px;
      }

      .auth-logo {
        transform: scale(1.7);
      }

      .auth-card h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>

<body class="auth-layout">

  <div class="auth-card">
    <img
      src="images/belltower-logo.png"
      alt="Belltower"
      class="auth-logo"
    />

    <h1>Welcome to Belltower</h1>
    <p>Sign in with your organization account.</p>

    <button class="btn-primary" id="googleBtn">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.159,7.957,3.043l5.657-5.657C33.64,6.053,29.084,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,16.104,18.961,13,24,13c3.059,0,5.842,1.159,7.957,3.043l5.657-5.657C33.64,6.053,29.084,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.779-1.977,13.285-5.197l-6.142-5.188C29.029,35.091,26.671,36,24,36c-5.188,0-9.594-3.317-11.258-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.118,5.615l6.142,5.188C36.883,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-meta">
      Secure sign‑in powered by Google. No passwords stored.
    </p>
  </div>

  <!-- ======================================================
       AUTH LOGIC — UNCHANGED
  ====================================================== -->

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://lmvpjbzwdyfziedpeytd.supabase.co',
    'YOUR_PUBLIC_KEY'
  );

  document.getElementById('googleBtn')
    .addEventListener('click', async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/auth/callback.html`
        }
      });
    });
</script>

</body>
</html>
