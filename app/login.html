
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belltower – Sign in</title>
  <link rel="stylesheet" href="/app/assets/admin-ui.css" />
  </head>
<body class="auth-layout">
  <div class="surface auth-card">
    <h1>Belltower</h1>
    <p>Sign in with Google to access Belltower.</p>

    <button class="btn-primary" id="googleBtn">
      <svg class="g" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12  s5.373-12,12-12c3.059,0,5.842,1.159,7.957,3.043l5.657-5.657C33.64,6.053,29.084,4,24,4C12.955,4,4,12.955,4,24 s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,16.104,18.961,13,24,13c3.059,0,5.842,1.159,7.957,3.043l5.657-5.657  C33.64,6.053,29.084,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.779-1.977,13.285-5.197l-6.142-5.188C29.029,35.091,26.671,36,24,36 c-5.188,0-9.594-3.317-11.258-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.118,5.615l0.003-0.002l6.142,5.188  C36.883,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continue with Google
    </button>

   
  
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';



const SUPABASE_URL = 'https://xrhwjjkxlshfarlxuxsa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyaHdqamt4bHNoZmFybHh1eHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzY0OTcsImV4cCI6MjA5MTMxMjQ5N30.Gf4oUa33DzIkc3fHwbyq-xc6Ptqq1jMFBzPCQM8dT-s';



    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const btn = document.getElementById('googleBtn');
    const hdInput = document.getElementById('hdInput');

    btn.addEventListener('click', async () => {
      const hd = null;
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/login.html`,
          queryParams: hd ? { hd } : undefined
        }
      });
    });


async function handlePostLoginRedirect() {
  console.log('POST LOGIN REDIRECT CHECK');

  const { data } = await supabase.auth.getSession();
  if (!data?.session) return; // Not logged in yet

  const user = data.session.user;


const { data: profile, error } = await supabase
  .from('profiles')
  .select(`
    status,
    can_login,
    is_superadmin,
    can_access_admin,
    can_manage_access,
    can_approve_pto,
    can_adjust_pto,
    can_bulk_upload
  `)
  .eq('user_id', user.id)
  .single();


  if (error || !profile) {
    alert('Profile not found.');
    return;
  }
  
  
  // ✅ HARD SECURITY GATE — FIRST
  if (profile.can_login !== true) {
    await supabase.auth.signOut();
    alert('Your account is disabled. Please contact an administrator.');
    window.location.href = '/login.html';
    return;
  }
console.log('SESSION:', data.session);

  // ✅ Pending users never get portal access
  if (profile.status === 'pending') {
    window.location.href = '/pending.html';
    return;
  }

  // ✅ Capability-based admin access check
  const hasAdminAccess =
    profile.is_superadmin === true ||
    profile.can_access_admin === true ||
    profile.can_manage_access === true ||
    profile.can_approve_pto === true ||
    profile.can_adjust_pto === true ||
    profile.can_bulk_upload === true;

  if (hasAdminAccess) {
    window.location.href = '/admin.html';
  } else {
    window.location.href = '/staff.html';
  }
}


// Run on page load
handlePostLoginRedirect();
  </script>
</body>
</html>
