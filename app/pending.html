
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Pending – School Suite</title>
  <link rel="stylesheet" href="/admin-ui.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="manifest" href="/icons/site.webmanifest">
  <!-- Fallback for older browsers -->
  <link rel="icon" href="/icons/favicon.ico">
</head>
<body class="auth-layout">

  <div class="surface auth-card">
    <h2>Account Pending</h2>

    <p>
      Your account has been created, but access to School Suite has not yet been approved.
    </p>

    <p class="muted">
      A school administrator must review and activate your account before you can continue.
    </p>

    <button class="btn" id="signOutBtn">Sign out</button>
  </div>

  <script type="module">
import { supabase } from '/app/admin.supabase.js';


    document.getElementById('signOutBtn').onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    };
  </script>

</body>
</html>
