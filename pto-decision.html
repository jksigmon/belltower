<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PTO Decision Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      padding: 40px 16px;
      color: #1f2937;
    }
    .card {
      max-width: 460px;
      background: #ffffff;
      border-radius: 8px;
      margin: 0 auto;
      padding: 28px;
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 22px;
    }
    .approved { color: #15803d; }
    .denied { color: #b91c1c; }
    p {
      line-height: 1.5;
    }
    .muted {
      font-size: 13px;
      color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">PTO Request</h1>
    <p id="message">The request has been processed.</p>
    <p class="muted">You may now close this window.</p>
  </div>


<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://lmvpjbzwdyfziedpeytd.supabase.co",
    "PUBLIC_ANON_KEY"
  );

  const params = new URLSearchParams(window.location.search);
  const requestId = params.get("requestId");

  const title = document.getElementById("title");
  const message = document.getElementById("message");

  if (!requestId) {
    title.textContent = "Invalid Request";
    message.textContent = "Missing PTO request reference.";
    throw new Error("Missing requestId");
  }

  const { data } = await supabase
    .from("pto_requests")
    .select("status")
    .eq("id", requestId)
    .single();

  switch (data.status) {
    case "APPROVED":
      title.textContent = "✅ PTO Approved";
      message.textContent = "The PTO request has been approved.";
      break;

    case "DENIED":
      title.textContent = "❌ PTO Denied";
      message.textContent = "The PTO request was denied.";
      break;

    case "CANCELLED":
      title.textContent = "ℹ️ PTO Cancelled";
      message.textContent = "The PTO has been cancelled.";
      break;

    case "RESCINDED":
      title.textContent = "ℹ️ PTO Rescinded";
      message.textContent =
        "The PTO has been rescinded and hours were credited back.";
      break;

    default:
      title.textContent = "PTO Processed";
      message.textContent = "This PTO request has been processed.";
  }
</script>


</body>
</html>
