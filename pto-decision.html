<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PTO Decision Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      padding: 40px 16px;
      color: #1f2937;
    }
    .card {
      max-width: 460px;
      background: #ffffff;
      border-radius: 8px;
      margin: 0 auto;
      padding: 28px;
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 22px;
    }
    .approved { color: #15803d; }
    .denied { color: #b91c1c; }
    p {
      line-height: 1.5;
    }
    .muted {
      font-size: 13px;
      color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">PTO Request</h1>
    <p id="message">The request has been processed.</p>
    <p class="muted">You may now close this window.</p>
  </div>


<script>
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");

  const title = document.getElementById("title");
  const message = document.getElementById("message");

  switch (status) {
    case "APPROVED":
      title.textContent = "✅ PTO Approved";
      title.className = "approved";
      message.textContent =
        "The PTO request has been approved successfully.";
      break;

    case "DENIED":
      title.textContent = "❌ PTO Denied";
      title.className = "denied";
      message.textContent =
        "The PTO request has been denied.";
      break;

    case "CANCELLED":
      title.textContent = "ℹ️ PTO Cancelled";
      message.textContent =
        "The approved PTO has been cancelled.";
      break;

    case "RESCINDED":
      title.textContent = "ℹ️ PTO Rescinded";
      message.textContent =
        "The previously approved PTO has been rescinded. PTO hours will be credited back.";
      break;

    default:
      title.textContent = "PTO Request Processed";
      message.textContent =
        "This PTO request has been processed.";
  }
</script>


</body>
</html>
